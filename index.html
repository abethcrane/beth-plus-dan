<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beth + Dan</title>

  <meta property="og:title" content="Beth + Dan">
  <meta property="og:description" content="A little corner of the internet for Beth & Dan.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bethplusdan.com">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #2c2a1f;
      --text: #f5f0e4;
      --text-muted: #d4ccb8;
      --accent: #8aab6e;
      --accent-light: #a8c98e;
      --warm: #d4a567;
      --card-bg: rgba(35, 33, 25, 0.75);
      --border: rgba(245, 240, 228, 0.12);
      --heading-font: 'Rubik Dirt', 'Caveat', cursive;
      --handwriting: 'Caveat', cursive;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-photo {
      position: fixed;
      inset: 0;
      background: url('assets/ridgewood reservoir.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(44, 42, 31, 0.4) 0%, rgba(44, 42, 31, 0.85) 100%);
      z-index: 0;
    }

    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    .home {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: var(--heading-font);
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.25em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      font-weight: 400 !important;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
      min-height: 1.2em;
    }

    h1 .letter {
      display: inline-block;
      cursor: grab;
      user-select: none;
      transition: transform 0.15s, opacity 0.15s;
      padding: 0 1px;
    }

    h1 .letter:active { cursor: grabbing; }
    h1 .letter.dragging { opacity: 0.4; transform: scale(0.9); }
    h1 .letter.drop-target { transform: scale(1.15); }

    h1 .letter.beth { color: #f0a0c0; }
    h1 .letter.plus { color: #ffffff; }
    h1 .letter.dan { color: #7bbfed; }
    h1 .letter.space { width: 0.3em; cursor: default; }

    .tagline {
      font-family: var(--handwriting);
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 2rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
      min-width: 180px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .link-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: rgba(138, 171, 110, 0.15);
    }

    .link-card .icon {
      font-size: 2rem;
    }

    .link-card .label {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .link-card .desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--handwriting);
      font-size: 1.1rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    @media (max-width: 500px) {
      .links { flex-direction: column; align-items: center; }
      .link-card { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="grain"></div>

  <div class="home">
    <h1 id="anagram"></h1>
  </div>

  <footer>
    <p>death & bean &middot; 2026</p>
  </footer>

  <script>
    (() => {
      const h1 = document.getElementById('anagram');
      const letters = [
        { char: 'B', cls: 'beth' },
        { char: 'e', cls: 'beth' },
        { char: 't', cls: 'beth' },
        { char: 'h', cls: 'beth' },
        { char: ' ', cls: 'space' },
        { char: '+', cls: 'plus' },
        { char: ' ', cls: 'space' },
        { char: 'D', cls: 'dan' },
        { char: 'a', cls: 'dan' },
        { char: 'n', cls: 'dan' },
      ];

      function render() {
        h1.innerHTML = '';
        letters.forEach((l, i) => {
          const span = document.createElement('span');
          span.textContent = l.char;
          span.className = `letter ${l.cls}`;
          span.dataset.index = i;
          if (l.cls !== 'space') {
            span.draggable = true;
            span.addEventListener('dragstart', onDragStart);
            span.addEventListener('dragend', onDragEnd);
            span.addEventListener('dragover', onDragOver);
            span.addEventListener('dragenter', onDragEnter);
            span.addEventListener('dragleave', onDragLeave);
            span.addEventListener('drop', onDrop);
            // touch support
            span.addEventListener('touchstart', onTouchStart, { passive: false });
            span.addEventListener('touchmove', onTouchMove, { passive: false });
            span.addEventListener('touchend', onTouchEnd);
          }
          h1.appendChild(span);
        });
      }

      let dragIdx = null;

      function onDragStart(e) {
        dragIdx = +e.target.dataset.index;
        e.target.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      }

      function onDragEnd(e) {
        e.target.classList.remove('dragging');
        h1.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
      }

      function onDragOver(e) { e.preventDefault(); }
      function onDragEnter(e) {
        e.preventDefault();
        if (+e.target.dataset.index !== dragIdx) e.target.classList.add('drop-target');
      }
      function onDragLeave(e) { e.target.classList.remove('drop-target'); }

      function onDrop(e) {
        e.preventDefault();
        const dropIdx = +e.target.dataset.index;
        e.target.classList.remove('drop-target');
        if (dragIdx !== null && dragIdx !== dropIdx) {
          const [moved] = letters.splice(dragIdx, 1);
          letters.splice(dropIdx, 0, moved);
          render();
        }
        dragIdx = null;
      }

      // Touch drag support
      let touchEl = null;
      let touchClone = null;
      let touchIdx = null;

      function onTouchStart(e) {
        const span = e.target;
        touchIdx = +span.dataset.index;
        touchEl = span;
        span.classList.add('dragging');

        touchClone = span.cloneNode(true);
        touchClone.style.position = 'fixed';
        touchClone.style.pointerEvents = 'none';
        touchClone.style.zIndex = '9999';
        touchClone.style.opacity = '0.8';
        touchClone.style.fontSize = getComputedStyle(h1).fontSize;
        touchClone.style.fontFamily = getComputedStyle(h1).fontFamily;
        document.body.appendChild(touchClone);
        const t = e.touches[0];
        touchClone.style.left = t.clientX - 15 + 'px';
        touchClone.style.top = t.clientY - 25 + 'px';
        e.preventDefault();
      }

      function onTouchMove(e) {
        if (!touchClone) return;
        const t = e.touches[0];
        touchClone.style.left = t.clientX - 15 + 'px';
        touchClone.style.top = t.clientY - 25 + 'px';

        const target = document.elementFromPoint(t.clientX, t.clientY);
        h1.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
        if (target && target.classList.contains('letter') && target !== touchEl) {
          target.classList.add('drop-target');
        }
        e.preventDefault();
      }

      function onTouchEnd(e) {
        if (touchClone) {
          document.body.removeChild(touchClone);
          touchClone = null;
        }
        if (touchEl) touchEl.classList.remove('dragging');

        const t = e.changedTouches[0];
        const target = document.elementFromPoint(t.clientX, t.clientY);
        if (target && target.classList.contains('letter') && target !== touchEl) {
          const dropIdx = +target.dataset.index;
          const [moved] = letters.splice(touchIdx, 1);
          letters.splice(dropIdx, 0, moved);
          render();
        }
        h1.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
        touchEl = null;
        touchIdx = null;
      }

      render();
    })();
  </script>
</body>
</html>
