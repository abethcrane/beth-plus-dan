<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bushwickopoly · Beth &amp; Dan Need an Apartment</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/apartmenthunt/style.css">
</head>
<body class="page-monopoly">
  <div class="page-bg"></div>
  <div class="page-bg-overlay"></div>
  <div class="grain"></div>

  <div class="page-monopoly-shell">
    <main class="monopoly-main">
      <section id="game" class="section monopoly-section monopoly-page">
        <div class="monopoly-panel">
          <h1 class="monopoly-page-title">Bushwickopoly</h1>
          <p class="mono-subtitle monopoly-panel-subtitle">Because every website needs a game</p>
          <div class="mono-board-wrap">
            <div id="monoBoard" class="mono-board" data-piece-human="/apartmenthunt/assets/hat.png" data-piece-ai="/apartmenthunt/assets/thimble.png" role="region" aria-label="Monopoly board"></div>
          </div>
        </div>
      </section>

      <div class="subpage-back-wrap">
        <a href="/apartmenthunt/" class="cta-btn cta-btn-outline">Get back to the hunt</a>
      </div>
    </main>

    <footer>
      <p>Beth &amp; Dan &middot; Ridgewood / Bushwick &middot; 2026</p>
    </footer>
  </div>

  <script src="/apartmenthunt/monopoly.js"></script>
</body>
</html>
